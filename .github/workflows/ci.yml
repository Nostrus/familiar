name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.2

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - run: pnpm nx format:check --base="remotes/origin/main"

      - run: pnpm nx run-many -t lint test typecheck
      - run: pnpm nx run-many -t build --exclude=@org/mobile
      - name: Run e2e tests
        timeout-minutes: 20
        run: cd apps/web-e2e && pnpm exec playwright test
